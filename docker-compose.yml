

services:
  mysql-db:
    image: mysql:8
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: voting_db
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  votingsystem:
    image: votingsystem
    container_name: votingsystem-container
    build: .
    ports:
      - "8083:8081"
    depends_on:
      - mysql-db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql-db:3306/voting_db?allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root123

volumes:
  mysql-data: